<!DOCTYPE html>
<html>
<head>
	<title>Schedule Exam</title>
	<link rel="stylesheet" type="text/css" href="exam1.css">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
</head>
<body>
	<div class="main">  	
		
		<form action="#" method="POST">
            <label for="chk" aria-hidden="true">Exam</label>
            <p>Subject</p>
            <select name="subjects" id="subjects">
                <option value="DSA">DSA</option>
                <option value="DSA">DSA - LAB</option>
                <option value="DSA">MATH</option>
                <option value="DSA">DE</option>
                <option value="DSA">DE - LAB</option>
                <option value="DSA">MP</option>
                <option value="DSA">MP - LAB</option>
                <option value="DSA">JAVA</option>
                <option value="DSA">JAVA - LAB</option>
                <option value="DSA">OE</option>
                <option value="DSA">EVENT</option>
                <option value="DSA">CASUAL</option>
            </select>
            <p>Date</p>
            <input type="date" name="" id="" required>
    
            <p>Starting Time</p>
            <input type="time" name="" id="" required>
    
            <p>Ending Time</p>
            <input type="time" name="" id="" required>
    
            <div class="radio">
                Send <input class="radio" type="checkbox" name="category" id="Send" required>
            </div>
                <br>
                  <button type="submit">Schedule</button>
            
        </form>

			
	</div>
</body>
</html>
